services:
  postgres:
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    image: postgres:16.4
  web:
    restart: always
    environment:
      - DJANGO_SECRET_KEY=local
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    build: ./
    command: >
      bash -c "uv run wait_for_postgres.py &&
               uv run manage.py migrate &&
               uv run manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/app
      - /app/.venv  # Exclude .venv from volume mount
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  documentation:
    restart: always
    build: ./
    command: "uv run -m mkdocs serve"
    volumes:
      - ./:/code
      - /code/.venv  # Exclude .venv from volume mount
    ports:
      - "8001:8001"